name: github_info

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_SERVER_URL: http://localhost:3000
    init: true
    ports:
      - "3001:80"
    env_file:
      - path: apps/web/.env
        required: false
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    init: true
    ports:
      - "3000:3000"
    env_file:
      - path: apps/server/.env
        required: false
    environment:
      CORS_ORIGIN: http://localhost:3001
      # Reach the host machine's PostgreSQL from inside the container
      DATABASE_URL: postgres://Admin@host.docker.internal:5432/personal_info
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
