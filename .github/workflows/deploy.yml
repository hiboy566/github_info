name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "packages/**"
      - "infra/production-bootstrap.yaml"
      - "template.yaml"
      - "samconfig.toml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-2
  BOOTSTRAP_STACK_NAME: github-info-bootstrap
  STACK_NAME: github-info
  ECR_REPOSITORY: github-info-server
  FRONTEND_BUCKET: github-info-web-956959393973-ap-southeast-2
  API_URL: https://xl59ygu7th.execute-api.ap-southeast-2.amazonaws.com
  DATABASE_CLUSTER_IDENTIFIER: database-github-info-sam
  DATABASE_NAME: database_github_info
  DATABASE_USER: postgres

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/server/go.mod
          cache-dependency-path: apps/server/go.sum

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check types and production builds
        run: pnpm run check-types
        env:
          VITE_SERVER_URL: ${{ env.API_URL }}

      - name: Test backend
        run: go -C apps/server test ./...

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy persistent bootstrap resources
        run: |
          aws cloudformation deploy \
            --region "$AWS_REGION" \
            --stack-name "$BOOTSTRAP_STACK_NAME" \
            --template-file infra/production-bootstrap.yaml \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              BackendRepositoryName="$ECR_REPOSITORY" \
              FrontendBucketName="$FRONTEND_BUCKET"

      - name: Resolve backend repository
        id: backend-repository
        run: |
          repository_uri="$(aws ecr describe-repositories \
            --region "$AWS_REGION" \
            --repository-names "$ECR_REPOSITORY" \
            --query "repositories[0].repositoryUri" \
            --output text)"
          test -n "$repository_uri"
          echo "repository_uri=$repository_uri" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        id: backend-image
        env:
          IMAGE_TAG: ${{ github.sha }}
          REPOSITORY_URI: ${{ steps.backend-repository.outputs.repository_uri }}
        run: |
          image_uri="$REPOSITORY_URI:$IMAGE_TAG"
          if aws ecr describe-images \
            --region "$AWS_REGION" \
            --repository-name "$ECR_REPOSITORY" \
            --image-ids "imageTag=$IMAGE_TAG" >/dev/null 2>&1; then
            echo "Backend image already exists: $image_uri"
          else
            docker build \
              --platform linux/amd64 \
              --file apps/server/Dockerfile \
              --tag "$image_uri" \
              .
            docker push "$image_uri"
          fi
          echo "image_uri=$image_uri" >> "$GITHUB_OUTPUT"

      - name: Verify backend image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          image_digest="$(aws ecr describe-images \
            --region "$AWS_REGION" \
            --repository-name "$ECR_REPOSITORY" \
            --image-ids "imageTag=$IMAGE_TAG" \
            --query "imageDetails[0].imageDigest" \
            --output text)"
          test -n "$image_digest"
          test "$image_digest" != "None"
          echo "Backend image digest: $image_digest"

      - name: Resolve active backend image tag
        id: active-backend-image
        env:
          FALLBACK_IMAGE_TAG: ${{ github.sha }}
        run: |
          current_task_definition="$(aws ecs describe-services \
            --region "$AWS_REGION" \
            --cluster github-info-cluster \
            --services github-info-server \
            --query "services[0].taskDefinition" \
            --output text 2>/dev/null || true)"

          if [ -z "$current_task_definition" ] || [ "$current_task_definition" = "None" ]; then
            image_tag="$FALLBACK_IMAGE_TAG"
          else
            current_image="$(aws ecs describe-task-definition \
              --region "$AWS_REGION" \
              --task-definition "$current_task_definition" \
              --query "taskDefinition.containerDefinitions[?name=='server'].image | [0]" \
              --output text)"
            image_tag="${current_image##*:}"
            if ! printf '%s' "$image_tag" | grep -Eq '^[0-9a-f]{40}$'; then
              image_tag="$FALLBACK_IMAGE_TAG"
            fi
          fi

          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "Infrastructure image tag: $image_tag"

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Build Lambda package
        run: sam build

      - name: Remove failed deployment stack
        run: |
          stack_status="$(aws cloudformation describe-stacks \
            --region "$AWS_REGION" \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || true)"
          if [ "$stack_status" = "ROLLBACK_COMPLETE" ]; then
            echo "Deleting failed stack before retry: $STACK_NAME"
            aws cloudformation delete-stack \
              --region "$AWS_REGION" \
              --stack-name "$STACK_NAME"
            aws cloudformation wait stack-delete-complete \
              --region "$AWS_REGION" \
              --stack-name "$STACK_NAME"
          fi

      - name: Deploy infrastructure
        env:
          BACKEND_REPOSITORY_URI: ${{ steps.backend-repository.outputs.repository_uri }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          if ! sam deploy \
            --region "$AWS_REGION" \
            --stack-name "$STACK_NAME" \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              BackendImageTag="${{ steps.active-backend-image.outputs.image_tag }}" \
              BackendRepositoryName="$ECR_REPOSITORY" \
              BackendRepositoryUri="$BACKEND_REPOSITORY_URI" \
              DatabaseClusterIdentifier="$DATABASE_CLUSTER_IDENTIFIER" \
              DatabaseName="$DATABASE_NAME" \
              DatabaseUser="$DATABASE_USER" \
              DatabasePassword="$DB_PASSWORD" \
              FrontendBucketName="$FRONTEND_BUCKET"; then
            aws cloudformation describe-stack-events \
              --region "$AWS_REGION" \
              --stack-name "$STACK_NAME" \
              --query "StackEvents[?contains(ResourceStatus, 'FAILED')].[Timestamp,ResourceStatus,ResourceType,LogicalResourceId,ResourceStatusReason]" \
              --output table || true
            exit 1
          fi

      - name: Deploy backend with CodeDeploy canary
        env:
          IMAGE_URI: ${{ steps.backend-image.outputs.image_uri }}
        run: |
          current_task_definition="$(aws ecs describe-services \
            --region "$AWS_REGION" \
            --cluster github-info-cluster \
            --services github-info-server \
            --query "services[0].taskDefinition" \
            --output text)"
          test -n "$current_task_definition"
          test "$current_task_definition" != "None"

          aws ecs describe-task-definition \
            --region "$AWS_REGION" \
            --task-definition "$current_task_definition" \
            --query "taskDefinition" \
            --output json > current-task-definition.json

          jq --arg image "$IMAGE_URI" '
            .containerDefinitions = (.containerDefinitions | map(
              if .name == "server" then .image = $image else . end
            ))
            | del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )
          ' current-task-definition.json > next-task-definition.json

          next_task_definition="$(aws ecs register-task-definition \
            --region "$AWS_REGION" \
            --cli-input-json file://next-task-definition.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)"
          test -n "$next_task_definition"
          test "$next_task_definition" != "None"
          echo "Registered task definition: $next_task_definition"

          jq -n --arg task_definition "$next_task_definition" '{
            version: 1,
            Resources: [
              {
                TargetService: {
                  Type: "AWS::ECS::Service",
                  Properties: {
                    TaskDefinition: $task_definition,
                    LoadBalancerInfo: {
                      ContainerName: "server",
                      ContainerPort: 3000
                    }
                  }
                }
              }
            ]
          }' > appspec.json

          jq -n \
            --arg content "$(cat appspec.json)" \
            --arg description "GitHub Actions ${GITHUB_SHA}" \
            '{
              applicationName: "github-info-api",
              deploymentGroupName: "github-info-api-bluegreen",
              description: $description,
              revision: {
                revisionType: "AppSpecContent",
                appSpecContent: {
                  content: $content
                }
              }
            }' > codedeploy-deployment.json

          deployment_id="$(aws deploy create-deployment \
            --region "$AWS_REGION" \
            --cli-input-json file://codedeploy-deployment.json \
            --query "deploymentId" \
            --output text)"
          test -n "$deployment_id"
          test "$deployment_id" != "None"
          echo "CodeDeploy deployment: $deployment_id"

          if ! aws deploy wait deployment-successful \
            --region "$AWS_REGION" \
            --deployment-id "$deployment_id"; then
            aws deploy get-deployment \
              --region "$AWS_REGION" \
              --deployment-id "$deployment_id" \
              --query "deploymentInfo.[status,errorInformation]" \
              --output json || true
            exit 1
          fi

      - name: Resolve frontend distribution
        id: frontend
        run: |
          distribution_id="$(aws cloudformation describe-stacks \
            --region "$AWS_REGION" \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendDistributionId'].OutputValue" \
            --output text)"
          frontend_url="$(aws cloudformation describe-stacks \
            --region "$AWS_REGION" \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendUrl'].OutputValue" \
            --output text)"
          test -n "$distribution_id"
          test -n "$frontend_url"
          echo "distribution_id=$distribution_id" >> "$GITHUB_OUTPUT"
          echo "frontend_url=$frontend_url" >> "$GITHUB_OUTPUT"

      - name: Build frontend
        run: pnpm --filter web build
        env:
          VITE_SERVER_URL: ${{ steps.frontend.outputs.frontend_url }}

      - name: Deploy frontend
        run: |
          aws s3 sync apps/web/dist "s3://$FRONTEND_BUCKET" \
            --delete \
            --region "$AWS_REGION"

      - name: Refresh frontend cache
        env:
          DISTRIBUTION_ID: ${{ steps.frontend.outputs.distribution_id }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths "/*"
