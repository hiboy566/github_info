AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: GitHub info service on ECS Fargate with ALB, Cloud Map, Lambda, and Aurora PostgreSQL in one VPC.

Parameters:
  DatabaseClusterIdentifier:
    Type: String
    Default: database-github-info-sam
    Description: Aurora DB cluster identifier.
  DatabaseName:
    Type: String
    Default: database_github_info
    Description: Aurora cluster initial database (immutable cluster property; not used by the app, which lives in PersonalDatabaseName).
  DatabaseUser:
    Type: String
    Default: postgres
  DatabasePassword:
    Type: String
    NoEcho: true
    MinLength: 8
  PersonalDatabaseName:
    Type: String
    Default: personal_info
    AllowedPattern: "[a-z_][a-z0-9_]*"
    Description: Logical database for personal-introduction data. Created automatically by the Go server on startup if missing.
  FrontendBucketName:
    Type: String
    Default: github-info-web-956959393973-ap-southeast-2
    Description: S3 website bucket created by the github-info-bootstrap stack.
  BackendRepositoryName:
    Type: String
    Default: github-info-server
    Description: ECR repository created by the github-info-bootstrap stack.
  BackendRepositoryUri:
    Type: String
    Default: 956959393973.dkr.ecr.ap-southeast-2.amazonaws.com/github-info-server
    Description: ECR repository URI created by the github-info-bootstrap stack.
  BackendImageTag:
    Type: String
    Description: Immutable Git commit SHA used as the ECR image tag for ECS Fargate.
    AllowedPattern: "[0-9a-f]{40}"

Globals:
  Function:
    Runtime: provided.al2023
    Architectures:
      - arm64
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        CORS_ORIGIN: !Sub https://${FrontendDistribution.DomainName}
        INTERNAL_API_URL: http://api.github-info.local:3000

Resources:
  FrontendSpaRewriteFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub ${AWS::StackName}-spa-rewrite
      AutoPublish: true
      FunctionConfig:
        Comment: Rewrite extensionless frontend routes to index.html without touching API responses.
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          var uri = request.uri;
          var isApi = uri === "/api" || uri.indexOf("/api/") === 0;
          if (!isApi && uri.indexOf(".") === -1) {
            request.uri = "/index.html";
          }
          return request;
        }

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowCredentials: true
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowOrigins:
          - !Sub https://${FrontendDistribution.DomainName}

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: HTTPS frontend for the GitHub token form.
        Enabled: true
        DefaultRootObject: index.html
        HttpVersion: http2and3
        IPV6Enabled: true
        Origins:
          - Id: FrontendS3Website
            DomainName: !Sub ${FrontendBucketName}.s3-website-${AWS::Region}.amazonaws.com
            CustomOriginConfig:
              HTTPPort: 80
              OriginProtocolPolicy: http-only
          - Id: BackendAlb
            DomainName: !GetAtt ApplicationLoadBalancer.DNSName
            CustomOriginConfig:
              HTTPPort: 80
              OriginProtocolPolicy: http-only
              OriginReadTimeout: 30
              OriginKeepaliveTimeout: 5
        DefaultCacheBehavior:
          TargetOriginId: FrontendS3Website
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt FrontendSpaRewriteFunction.FunctionARN
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: BackendAlb
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - PATCH
              - POST
              - DELETE
            CachedMethods:
              - GET
              - HEAD
              - OPTIONS
            Compress: true
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

  GitHubInfoFunction:
    Type: AWS::Serverless::Function
    DependsOn: EcsService
    Properties:
      CodeUri: apps/server
      Handler: bootstrap
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !Ref PrivateLambdaSubnetA
          - !Ref PrivateLambdaSubnetB
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY
        RootApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /
            Method: ANY
    Metadata:
      BuildMethod: makefile

  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.42.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: github-info-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref Vpc

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.42.0.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: github-info-public

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.42.3.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: github-info-public-b

  PrivateLambdaSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.42.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: github-info-lambda-a

  PrivateLambdaSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.42.2.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: github-info-lambda-b

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet

  PublicSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetB

  NatEip:
    Type: AWS::EC2::EIP
    DependsOn: VpcGatewayAttachment
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEip.AllocationId
      SubnetId: !Ref PublicSubnet

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateLambdaSubnetA

  PrivateSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateLambdaSubnetB

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Lambda access to the private ECS API through Cloud Map.
      VpcId: !Ref Vpc
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Public HTTP access to the GitHub info Application Load Balancer.
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: github-info-alb

  EcsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Private Fargate API access from the ALB and Lambda only.
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          SourceSecurityGroupId: !Ref AlbSecurityGroup
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          SourceSecurityGroupId: !Ref LambdaSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: github-info-ecs

  BastionSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: SSM bastion host without inbound SSH.
      VpcId: !Ref Vpc
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  DatabaseSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Aurora PostgreSQL access from ECS, Lambda, and the SSM bastion only.
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref LambdaSecurityGroup
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref BastionSecurityGroup
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref EcsSecurityGroup

  BastionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  BastionInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref BastionRole

  BastionHost:
    Type: AWS::EC2::Instance
    Properties:
      IamInstanceProfile: !Ref BastionInstanceProfile
      ImageId: !Sub "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}"
      InstanceType: t3.nano
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref BastionSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 8
            VolumeType: gp3
            Encrypted: true
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: github-info-ssm-bastion

  DatabasePasswordSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: Aurora PostgreSQL password injected into the ECS task at runtime.
      SecretString: !Ref DatabasePassword
      Tags:
        - Key: Name
          Value: github-info-database-password
        - Key: Project
          Value: github-info

  EcsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/github-info-server
      RetentionInDays: 7

  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: github-info-cluster
      ClusterSettings:
        - Name: containerInsights
          Value: disabled
      Tags:
        - Key: Name
          Value: github-info-cluster
        - Key: Project
          Value: github-info

  EcsTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub arn:${AWS::Partition}:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: ReadDatabasePassword
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref DatabasePasswordSecret
      Tags:
        - Key: Name
          Value: github-info-ecs-task-execution

  EcsTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Tags:
        - Key: Name
          Value: github-info-ecs-task

  CloudMapNamespace:
    Type: AWS::ServiceDiscovery::PrivateDnsNamespace
    Properties:
      Name: github-info.local
      Description: Private service discovery for the GitHub info VPC.
      Vpc: !Ref Vpc
      Tags:
        - Key: Name
          Value: github-info.local

  EcsDiscoveryService:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: api
      Description: Private DNS records for GitHub info Fargate tasks.
      NamespaceId: !Ref CloudMapNamespace
      DnsConfig:
        DnsRecords:
          - Type: A
            TTL: 10
        RoutingPolicy: MULTIVALUE
      HealthCheckCustomConfig:
        FailureThreshold: 1
      Tags:
        - Key: Name
          Value: api.github-info.local

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Scheme: internet-facing
      Type: application
      IpAddressType: ipv4
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Subnets:
        - !Ref PublicSubnet
        - !Ref PublicSubnetB
      LoadBalancerAttributes:
        - Key: deletion_protection.enabled
          Value: "false"
        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: "true"
        - Key: idle_timeout.timeout_seconds
          Value: "60"
      Tags:
        - Key: Name
          Value: github-info-alb
        - Key: Project
          Value: github-info

  EcsTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !Ref Vpc
      TargetType: ip
      Protocol: HTTP
      ProtocolVersion: HTTP1
      Port: 3000
      HealthCheckEnabled: true
      HealthCheckProtocol: HTTP
      HealthCheckPath: /
      HealthCheckPort: traffic-port
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: "200"
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: "30"
      Tags:
        - Key: Name
          Value: github-info-api

  EcsGreenTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !Ref Vpc
      TargetType: ip
      Protocol: HTTP
      ProtocolVersion: HTTP1
      Port: 3000
      HealthCheckEnabled: true
      HealthCheckProtocol: HTTP
      HealthCheckPath: /
      HealthCheckPort: traffic-port
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: "200"
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: "30"
      Tags:
        - Key: Name
          Value: github-info-api-green
        - Key: Project
          Value: github-info

  AlbListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref EcsTargetGroup

  EcsTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: github-info-server
      Cpu: "256"
      Memory: "512"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt EcsTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt EcsTaskRole.Arn
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      ContainerDefinitions:
        - Name: server
          Essential: true
          Image: !Join [":", [!Ref BackendRepositoryUri, !Ref BackendImageTag]]
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          Environment:
            - Name: PORT
              Value: "3000"
            - Name: CORS_ORIGIN
              Value: !Sub https://${FrontendDistribution.DomainName}
            - Name: PGHOST
              Value: !GetAtt DatabaseCluster.Endpoint.Address
            - Name: PGPORT
              Value: "5432"
            - Name: PGDATABASE
              Value: !Ref PersonalDatabaseName
            - Name: PGUSER
              Value: !Ref DatabaseUser
            - Name: PGSSLMODE
              Value: require
          Secrets:
            - Name: PGPASSWORD
              ValueFrom: !Ref DatabasePasswordSecret
          HealthCheck:
            Command:
              - CMD-SHELL
              - wget -qO- http://localhost:3000/ || exit 1
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 30
          LinuxParameters:
            InitProcessEnabled: true
          StopTimeout: 30
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref EcsLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: server
      Tags:
        - Key: Name
          Value: github-info-server
        - Key: Project
          Value: github-info

  EcsService:
    Type: AWS::ECS::Service
    DependsOn: AlbListener
    Properties:
      ServiceName: github-info-server
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref EcsTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      PlatformVersion: LATEST
      HealthCheckGracePeriodSeconds: 90
      DeploymentController:
        Type: CODE_DEPLOY
      EnableECSManagedTags: true
      PropagateTags: SERVICE
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 100
      LoadBalancers:
        - ContainerName: server
          ContainerPort: 3000
          TargetGroupArn: !Ref EcsTargetGroup
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups:
            - !Ref EcsSecurityGroup
          Subnets:
            - !Ref PrivateLambdaSubnetA
            - !Ref PrivateLambdaSubnetB
      ServiceRegistries:
        - RegistryArn: !GetAtt EcsDiscoveryService.Arn
      Tags:
        - Key: Name
          Value: github-info-server
        - Key: Project
          Value: github-info

  CodeDeployServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codedeploy.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub arn:${AWS::Partition}:iam::aws:policy/AWSCodeDeployRoleForECS
      Tags:
        - Key: Name
          Value: github-info-codedeploy
        - Key: Project
          Value: github-info

  CodeDeployApplication:
    Type: AWS::CodeDeploy::Application
    Properties:
      ApplicationName: github-info-api
      ComputePlatform: ECS
      Tags:
        - Key: Name
          Value: github-info-api
        - Key: Project
          Value: github-info

  CodeDeployDeploymentGroup:
    Type: AWS::CodeDeploy::DeploymentGroup
    Properties:
      ApplicationName: !Ref CodeDeployApplication
      DeploymentGroupName: github-info-api-bluegreen
      DeploymentConfigName: CodeDeployDefault.ECSCanary10Percent5Minutes
      ServiceRoleArn: !GetAtt CodeDeployServiceRole.Arn
      DeploymentStyle:
        DeploymentOption: WITH_TRAFFIC_CONTROL
        DeploymentType: BLUE_GREEN
      BlueGreenDeploymentConfiguration:
        DeploymentReadyOption:
          ActionOnTimeout: CONTINUE_DEPLOYMENT
        TerminateBlueInstancesOnDeploymentSuccess:
          Action: TERMINATE
          TerminationWaitTimeInMinutes: 5
      AutoRollbackConfiguration:
        Enabled: true
        Events:
          - DEPLOYMENT_FAILURE
          - DEPLOYMENT_STOP_ON_ALARM
      AlarmConfiguration:
        Enabled: true
        IgnorePollAlarmFailure: false
        Alarms:
          - Name: !Ref ApiReadCanaryAlarm
          - Name: !Ref ApiContractCanaryAlarm
      ECSServices:
        - ClusterName: !Ref EcsCluster
          ServiceName: github-info-server
      LoadBalancerInfo:
        TargetGroupPairInfoList:
          - ProdTrafficRoute:
              ListenerArns:
                - !Ref AlbListener
            TargetGroups:
              - Name: !GetAtt EcsTargetGroup.TargetGroupName
              - Name: !GetAtt EcsGreenTargetGroup.TargetGroupName
      Tags:
        - Key: Name
          Value: github-info-api-bluegreen
        - Key: Project
          Value: github-info

  DatabaseSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Private subnets for Aurora PostgreSQL.
      SubnetIds:
        - !Ref PrivateLambdaSubnetA
        - !Ref PrivateLambdaSubnetB

  DatabaseCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      DBClusterIdentifier: !Ref DatabaseClusterIdentifier
      Engine: aurora-postgresql
      EngineMode: provisioned
      DatabaseName: !Ref DatabaseName
      MasterUsername: !Ref DatabaseUser
      MasterUserPassword: !Sub "{{resolve:secretsmanager:${DatabasePasswordSecret}:SecretString}}"
      DBSubnetGroupName: !Ref DatabaseSubnetGroup
      VpcSecurityGroupIds:
        - !Ref DatabaseSecurityGroup
      ServerlessV2ScalingConfiguration:
        MinCapacity: 0.5
        MaxCapacity: 4
      StorageEncrypted: true
      BackupRetentionPeriod: 1
      CopyTagsToSnapshot: false
      DeletionProtection: false

  DatabaseInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref DatabaseCluster
      DBInstanceClass: db.serverless
      Engine: aurora-postgresql
      PubliclyAccessible: false

  SyntheticsArtifactBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: DeleteCanaryArtifactsAfter30Days
            Status: Enabled
            ExpirationInDays: 30
      Tags:
        - Key: Name
          Value: github-info-synthetics-artifacts
        - Key: Project
          Value: github-info

  SyntheticsCanaryRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
                - synthetics.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: RunGithubInfoCanaries
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetBucketLocation
                  - s3:ListBucket
                Resource: !GetAtt SyntheticsArtifactBucket.Arn
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub ${SyntheticsArtifactBucket.Arn}/*
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/cwsyn-github-info-*
                  - !Sub arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/cwsyn-github-info-*:log-stream:*
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                Resource: "*"
                Condition:
                  StringEquals:
                    cloudwatch:namespace: CloudWatchSynthetics
      Tags:
        - Key: Name
          Value: github-info-synthetics
        - Key: Project
          Value: github-info

  HomepageCanary:
    Type: AWS::Synthetics::Canary
    Properties:
      Name: github-info-homepage
      ArtifactS3Location: !Sub s3://${SyntheticsArtifactBucket}/homepage
      ExecutionRoleArn: !GetAtt SyntheticsCanaryRole.Arn
      RuntimeVersion: syn-nodejs-puppeteer-16.1
      StartCanaryAfterCreation: true
      Schedule:
        Expression: rate(5 minutes)
      RunConfig:
        TimeoutInSeconds: 60
        MemoryInMB: 960
      Code:
        Handler: index.handler
        Script: !Sub |
          const synthetics = require('@aws/synthetics-puppeteer');

          exports.handler = async () => {
            const page = await synthetics.getPage();
            const url = 'https://${FrontendDistribution.DomainName}/';

            await synthetics.executeStep('load-homepage', async () => {
              const response = await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 30000 });
              if (!response || response.status() !== 200) {
                throw new Error('Expected homepage HTTP 200, got ' + (response ? response.status() : 'no response'));
              }
            });

            await synthetics.executeStep('verify-homepage-content', async () => {
              await page.waitForSelector('input[name="token"]', { timeout: 10000 });
              const bodyText = await page.evaluate(() => document.body.innerText);
              if (!bodyText.includes('GitHub Account Fetcher')) {
                throw new Error('Homepage title was not rendered');
              }
              if (!bodyText.includes('GitHub Personal Access Token')) {
                throw new Error('Token form label was not rendered');
              }
            });
          };
      Tags:
        - Key: Name
          Value: github-info-homepage
        - Key: Project
          Value: github-info

  SpaRouteCanary:
    Type: AWS::Synthetics::Canary
    Properties:
      Name: github-info-spa-route
      ArtifactS3Location: !Sub s3://${SyntheticsArtifactBucket}/spa-route
      ExecutionRoleArn: !GetAtt SyntheticsCanaryRole.Arn
      RuntimeVersion: syn-nodejs-puppeteer-16.1
      StartCanaryAfterCreation: true
      Schedule:
        Expression: rate(5 minutes)
      RunConfig:
        TimeoutInSeconds: 60
        MemoryInMB: 960
      Code:
        Handler: index.handler
        Script: !Sub |
          const synthetics = require('@aws/synthetics-puppeteer');

          exports.handler = async () => {
            const page = await synthetics.getPage();
            const url = 'https://${FrontendDistribution.DomainName}/intro/hiboy566';

            await synthetics.executeStep('load-spa-route', async () => {
              const response = await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 30000 });
              if (!response || response.status() !== 200) {
                throw new Error('Expected SPA route HTTP 200, got ' + (response ? response.status() : 'no response'));
              }
            });

            await synthetics.executeStep('verify-intro-content', async () => {
              await page.waitForFunction(() => document.body.innerText.includes('@hiboy566'), { timeout: 15000 });
              const bodyText = await page.evaluate(() => document.body.innerText);
              if (!bodyText.includes('个人介绍')) {
                throw new Error('Intro page content was not rendered');
              }
            });
          };
      Tags:
        - Key: Name
          Value: github-info-spa-route
        - Key: Project
          Value: github-info

  ApiReadCanary:
    Type: AWS::Synthetics::Canary
    DependsOn: EcsService
    Properties:
      Name: github-info-api-read
      ArtifactS3Location: !Sub s3://${SyntheticsArtifactBucket}/api-read
      ExecutionRoleArn: !GetAtt SyntheticsCanaryRole.Arn
      RuntimeVersion: syn-nodejs-puppeteer-16.1
      StartCanaryAfterCreation: true
      Schedule:
        Expression: rate(1 minute)
      RunConfig:
        TimeoutInSeconds: 60
        MemoryInMB: 960
      Code:
        Handler: index.handler
        Script: !Sub |
          const https = require('https');
          const synthetics = require('@aws/synthetics-puppeteer');

          function requestJson(path) {
            const url = new URL(path, 'https://${FrontendDistribution.DomainName}');
            return new Promise((resolve, reject) => {
              const req = https.request(url, { method: 'GET', timeout: 30000 }, (res) => {
                let body = '';
                res.setEncoding('utf8');
                res.on('data', (chunk) => { body += chunk; });
                res.on('end', () => {
                  let json;
                  try {
                    json = JSON.parse(body);
                  } catch {
                    reject(new Error('Response was not JSON: ' + body.slice(0, 120)));
                    return;
                  }
                  resolve({ statusCode: res.statusCode, headers: res.headers, body: json });
                });
              });
              req.on('error', reject);
              req.on('timeout', () => req.destroy(new Error('Request timed out')));
              req.end();
            });
          }

          exports.handler = async () => {
            await synthetics.executeStep('get-existing-intro', async () => {
              const result = await requestJson('/api/intro/hiboy566');
              if (result.statusCode !== 200) {
                throw new Error('Expected API read HTTP 200, got ' + result.statusCode);
              }
              if (!result.headers['content-type'] || !result.headers['content-type'].includes('application/json')) {
                throw new Error('Expected JSON content type');
              }
              if (!result.body.account || result.body.account.login !== 'hiboy566') {
                throw new Error('Expected account.login to be hiboy566');
              }
            });
          };
      Tags:
        - Key: Name
          Value: github-info-api-read
        - Key: Project
          Value: github-info

  ApiContractCanary:
    Type: AWS::Synthetics::Canary
    DependsOn: EcsService
    Properties:
      Name: github-info-api-404
      ArtifactS3Location: !Sub s3://${SyntheticsArtifactBucket}/api-404
      ExecutionRoleArn: !GetAtt SyntheticsCanaryRole.Arn
      RuntimeVersion: syn-nodejs-puppeteer-16.1
      StartCanaryAfterCreation: true
      Schedule:
        Expression: rate(5 minutes)
      RunConfig:
        TimeoutInSeconds: 60
        MemoryInMB: 960
      Code:
        Handler: index.handler
        Script: !Sub |
          const https = require('https');
          const synthetics = require('@aws/synthetics-puppeteer');

          function requestJson(path) {
            const url = new URL(path, 'https://${FrontendDistribution.DomainName}');
            return new Promise((resolve, reject) => {
              const req = https.request(url, { method: 'GET', timeout: 30000 }, (res) => {
                let body = '';
                res.setEncoding('utf8');
                res.on('data', (chunk) => { body += chunk; });
                res.on('end', () => {
                  let json;
                  try {
                    json = JSON.parse(body);
                  } catch {
                    reject(new Error('Response was not JSON: ' + body.slice(0, 120)));
                    return;
                  }
                  resolve({ statusCode: res.statusCode, headers: res.headers, body: json });
                });
              });
              req.on('error', reject);
              req.on('timeout', () => req.destroy(new Error('Request timed out')));
              req.end();
            });
          }

          exports.handler = async () => {
            await synthetics.executeStep('verify-api-not-found-contract', async () => {
              const result = await requestJson('/api/intro/github-info-synthetics-missing-user');
              if (result.statusCode !== 404) {
                throw new Error('Expected API contract HTTP 404, got ' + result.statusCode);
              }
              if (!result.headers['content-type'] || !result.headers['content-type'].includes('application/json')) {
                throw new Error('Expected JSON content type');
              }
              if (!result.body.error || result.body.error.code !== 'NOT_FOUND') {
                throw new Error('Expected NOT_FOUND error code');
              }
            });
          };
      Tags:
        - Key: Name
          Value: github-info-api-404
        - Key: Project
          Value: github-info

  SyntheticsAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: github-info-synthetics-alerts
      DisplayName: github-info Synthetics alerts
      Tags:
        - Key: Name
          Value: github-info-synthetics-alerts
        - Key: Project
          Value: github-info

  SyntheticsIncidentDlq:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: github-info-synthetics-incident-dlq
      MessageRetentionPeriod: 1209600
      SqsManagedSseEnabled: true
      Tags:
        - Key: Name
          Value: github-info-synthetics-incident-dlq
        - Key: Project
          Value: github-info

  SyntheticsSnsDeliveryDlq:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: github-info-synthetics-sns-delivery-dlq
      MessageRetentionPeriod: 1209600
      SqsManagedSseEnabled: true
      Tags:
        - Key: Name
          Value: github-info-synthetics-sns-delivery-dlq
        - Key: Project
          Value: github-info

  SyntheticsIncidentQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: github-info-synthetics-incidents
      MessageRetentionPeriod: 1209600
      VisibilityTimeout: 60
      SqsManagedSseEnabled: true
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt SyntheticsIncidentDlq.Arn
        maxReceiveCount: 5
      Tags:
        - Key: Name
          Value: github-info-synthetics-incidents
        - Key: Project
          Value: github-info

  SyntheticsIncidentQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref SyntheticsIncidentQueue
        - !Ref SyntheticsSnsDeliveryDlq
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowSyntheticsAlertsTopicToSendMessages
            Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource:
              - !GetAtt SyntheticsIncidentQueue.Arn
              - !GetAtt SyntheticsSnsDeliveryDlq.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref SyntheticsAlertTopic

  SyntheticsIncidentSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref SyntheticsAlertTopic
      Protocol: sqs
      Endpoint: !GetAtt SyntheticsIncidentQueue.Arn
      RawMessageDelivery: true
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt SyntheticsSnsDeliveryDlq.Arn

  HomepageCanaryAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: github-info-homepage-canary-failed
      AlarmDescription: Homepage Synthetics canary success percent dropped below 100.
      Namespace: CloudWatchSynthetics
      MetricName: SuccessPercent
      Dimensions:
        - Name: CanaryName
          Value: !Ref HomepageCanary
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 100
      ComparisonOperator: LessThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref SyntheticsAlertTopic

  SpaRouteCanaryAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: github-info-spa-route-canary-failed
      AlarmDescription: Frontend SPA intro route Synthetics canary success percent dropped below 100.
      Namespace: CloudWatchSynthetics
      MetricName: SuccessPercent
      Dimensions:
        - Name: CanaryName
          Value: !Ref SpaRouteCanary
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 100
      ComparisonOperator: LessThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref SyntheticsAlertTopic

  ApiReadCanaryAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: github-info-api-read-canary-failed
      AlarmDescription: Successful intro API read Synthetics canary success percent dropped below 100.
      Namespace: CloudWatchSynthetics
      MetricName: SuccessPercent
      Dimensions:
        - Name: CanaryName
          Value: !Ref ApiReadCanary
      Statistic: Average
      Period: 60
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 100
      ComparisonOperator: LessThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref SyntheticsAlertTopic

  ApiContractCanaryAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: github-info-api-404-canary-failed
      AlarmDescription: API NOT_FOUND contract Synthetics canary success percent dropped below 100.
      Namespace: CloudWatchSynthetics
      MetricName: SuccessPercent
      Dimensions:
        - Name: CanaryName
          Value: !Ref ApiContractCanary
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 100
      ComparisonOperator: LessThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref SyntheticsAlertTopic

Outputs:
  BackendRepositoryName:
    Description: ECR repository used for the Go backend container image.
    Value: !Ref BackendRepositoryName
  BackendRepositoryUri:
    Description: ECR repository URI used by GitHub Actions and ECS.
    Value: !Ref BackendRepositoryUri
  ApplicationLoadBalancerUrl:
    Description: Direct public HTTP endpoint for the ECS Fargate API.
    Value: !Sub http://${ApplicationLoadBalancer.DNSName}
  CloudMapServiceName:
    Description: Private DNS name used by Lambda to reach ECS inside the VPC.
    Value: api.github-info.local
  EcsClusterArn:
    Description: ECS cluster ARN.
    Value: !GetAtt EcsCluster.Arn
  EcsServiceArn:
    Description: ECS Fargate service ARN.
    Value: !Ref EcsService
  EcsTaskDefinitionArn:
    Description: Active ECS task definition ARN created by this stack revision.
    Value: !Ref EcsTaskDefinition
  DatabasePasswordSecretArn:
    Description: Secrets Manager ARN injected into the Fargate task as PGPASSWORD.
    Value: !Ref DatabasePasswordSecret
  VpcId:
    Description: VPC used by Lambda, ECS, Aurora, and the load balancer.
    Value: !Ref Vpc
  PublicSubnetIds:
    Description: Public subnets in two Availability Zones for the internet-facing load balancer.
    Value: !Join [",", [!Ref PublicSubnet, !Ref PublicSubnetB]]
  PrivateSubnetIds:
    Description: Private subnets used by Lambda, ECS Fargate, and Aurora PostgreSQL.
    Value: !Join [",", [!Ref PrivateLambdaSubnetA, !Ref PrivateLambdaSubnetB]]
  ApiUrl:
    Description: HTTP API endpoint.
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/
  DatabaseEndpoint:
    Description: Aurora PostgreSQL writer endpoint.
    Value: !GetAtt DatabaseCluster.Endpoint.Address
  BastionInstanceId:
    Description: SSM bastion instance id for local database migration tunnels.
    Value: !Ref BastionHost
  FrontendUrl:
    Description: HTTPS URL for the frontend.
    Value: !Sub https://${FrontendDistribution.DomainName}
  FrontendDistributionId:
    Description: CloudFront distribution ID used for cache invalidation.
    Value: !Ref FrontendDistribution
  HomepageCanaryName:
    Description: CloudWatch Synthetics canary for the public homepage.
    Value: !Ref HomepageCanary
  SpaRouteCanaryName:
    Description: CloudWatch Synthetics canary for the frontend intro route.
    Value: !Ref SpaRouteCanary
  ApiReadCanaryName:
    Description: CloudWatch Synthetics canary for the successful intro API read path.
    Value: !Ref ApiReadCanary
  ApiContractCanaryName:
    Description: CloudWatch Synthetics canary for the API NOT_FOUND JSON contract.
    Value: !Ref ApiContractCanary
  SyntheticsAlertTopicArn:
    Description: SNS topic receiving CloudWatch alarms from Synthetics canaries.
    Value: !Ref SyntheticsAlertTopic
  SyntheticsIncidentQueueUrl:
    Description: SQS queue storing Synthetics alarm events for replay or incident automation.
    Value: !Ref SyntheticsIncidentQueue
  SyntheticsIncidentQueueArn:
    Description: ARN of the Synthetics incident queue.
    Value: !GetAtt SyntheticsIncidentQueue.Arn
  SyntheticsIncidentDlqUrl:
    Description: DLQ for Synthetics incident queue processing failures.
    Value: !Ref SyntheticsIncidentDlq
  SyntheticsSnsDeliveryDlqUrl:
    Description: DLQ for SNS subscription delivery failures to the incident queue.
    Value: !Ref SyntheticsSnsDeliveryDlq
